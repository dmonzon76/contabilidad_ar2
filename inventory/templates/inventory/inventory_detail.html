<h2>{{ item.product.name }}</h2>

<p><strong>Current stock:</strong> {{ item.quantity }}</p>
<p><strong>Minimum stock:</strong> {{ item.min_stock }}</p>

<a href="{% url 'movement_add' item.pk %}">New Movement</a>

<hr>

<h3>Movements</h3>

<table>
    <thead>
        <tr>
            <th>Date</th>
            <th>Type</th>
            <th>Quantity</th>
            <th>Note</th>
        </tr>
    </thead>
    <tbody>
        {% for m in movements %}
        <tr>
            <td>{{ m.date }}</td>
            <td>{{ m.get_movement_type_display }}</td>
            <td>{{ m.quantity }}</td>
            <td>{{ m.note }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
