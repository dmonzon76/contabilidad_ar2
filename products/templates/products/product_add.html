<h2>Add Product</h2>

<form method="post">
    {% csrf_token %}
    <label>Name</label>
    <input type="text" name="name" required>

    <label>SKU</label>
    <input type="text" name="sku" required>

    <label>Description</label>
    <input type="text" name="description">

    <button type="submit">Save</button>
</form>
