{% extends "base.html" %}

{% block content %}
<h2 class="erp-title-page">Sales</h2>

<a href="{% url 'sales:sale_create' %}" class="btn btn-primary mb-3">New Sale</a>

<div class="erp-card p-3">
    <table class="table">
        <thead>
            <tr>
                <th>Number</th>
                <th>Date</th>
                <th>Customer</th>
                <th>Total</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for sale in sales %}
            <tr>
                <td>{{ sale.number }}</td>
                <td>{{ sale.date }}</td>
                <td>{{ sale.customer.name }}</td>
                <td>{{ sale.total_amount }}</td>
                <td>
                    <a href="{% url 'sales:sale_detail' sale.id %}" class="btn btn-sm btn-secondary">View</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
