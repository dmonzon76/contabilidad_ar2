{% extends "base.html" %}

{% block content %}
<h2 class="erp-title-page">Customers</h2>

<a href="{% url 'sales:customer_add' %}" class="btn btn-primary mb-3">Add Customer</a>

<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th>Name</th>
            <th>Tax ID</th>
            <th>Email</th>
            <th>Phone</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for c in object_list %}
        <tr>
            <td>{{ c.name }}</td>
            <td>{{ c.tax_id }}</td>
            <td>{{ c.email }}</td>
            <td>{{ c.phone }}</td>
            <td>
                <a href="{% url 'sales:customer_edit' c.pk %}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{% url 'sales:customer_delete' c.pk %}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
