<h2>Add Customer</h2>

<form method="post">
    {% csrf_token %}
    <label>Name</label>
    <input type="text" name="name" required>

    <label>Email</label>
    <input type="email" name="email">

    <label>Phone</label>
    <input type="text" name="phone">

    <label>Address</label>
    <input type="text" name="address">

    <button type="submit">Save</button>
</form>
