{% extends "base.html" %}

{% block content %}
<h2 class="erp-title-page">Purchases</h2>

<div class="erp-card p-3">
    <a href="{% url 'purchases:purchase_create' %}" class="btn btn-primary mb-3">
        New Purchase
    </a>

    <table class="table table-sm table-striped">
        <thead>
            <tr>
                <th>Date</th>
                <th>Supplier</th>
                <th>Invoice</th>
                <th>Total</th>
                <th></th>
            </tr>
        </thead>

        <tbody>
            {% for p in object_list %}
            <tr>
                <td>{{ p.date }}</td>
                <td>{{ p.supplier.name }}</td>
                <td>{{ p.invoice_number }}</td>
                <td>{{ p.total_amount }}</td>
                <td>
                    <a href="{% url 'purchases:purchase_detail' p.id %}">View</a> |
                    <a href="{% url 'purchases:purchase_edit' p.id %}">Edit</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
