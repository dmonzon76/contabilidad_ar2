{% extends "base.html" %}

{% block content %}

<h2 class="erp-title-page">Edit Company — {{ company.name }}</h2>

<div class="erp-card p-4">

    <form method="post">
        {% csrf_token %}

        <div class="row g-3">

            <div class="col-md-6">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control" value="{{ company.name }}" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">CUIT</label>
                <input type="text" name="tax_id" class="form-control" value="{{ company.tax_id }}" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">AFIP Category</label>
                <select name="afip_category" class="form-select">
                    {% for value, label in company.AFIP_CATEGORY_CHOICES %}
                        <option value="{{ value }}" {% if company.afip_category == value %}selected{% endif %}>
                            {{ label }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Address</label>
                <input type="text" name="address" class="form-control" value="{{ company.address }}">
            </div>

            <div class="col-md-4">
                <label class="form-label">City</label>
                <input type="text" name="city" class="form-control" value="{{ company.city }}">
            </div>

            <div class="col-md-4">
                <label class="form-label">Province</label>
                <input type="text" name="province" class="form-control" value="{{ company.province }}">
            </div>

        </div>

        <div class="mt-4 d-flex justify-content-between">
            <a href="{% url 'company_detail' company.id %}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Save</button>
        </div>

    </form>

</div>

{% endblock %}
