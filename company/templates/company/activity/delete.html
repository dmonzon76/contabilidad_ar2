{% extends "base.html" %}

{% block content %}
<h2 class="erp-title-page">Delete Activity — {{ company.name }}</h2>

<p>Are you sure you want to delete activity <strong>{{ activity.code }}</strong>?</p>

<form method="post" class="erp-card p-3">
    {% csrf_token %}
    <button class="btn btn-danger">Delete</button>
    <a href="{% url 'company_activity_list' company.id %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
