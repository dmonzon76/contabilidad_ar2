{% extends "base.html" %}

{% block content %}
<h2 class="erp-title-page">Edit AFIP Activity — {{ company.name }}</h2>

<form method="post" class="erp-card p-4">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">AFIP Activity</label>

        <select name="activity" class="form-select select2-afip" style="width:100%;">
            {% if form.instance.activity %}
                <option value="{{ form.instance.activity.id }}" selected>
                    {{ form.instance.activity.code }} – {{ form.instance.activity.description }}
                </option>
            {% endif %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Jurisdiction</label>
        {{ form.jurisdiction }}
    </div>

    <div class="mb-3">
        <label class="form-label">Primary Activity</label>
        {{ form.is_primary }}
    </div>

    <button class="btn btn-primary">Update</button>
    <a href="{% url 'company_activity_list' company.id %}" class="btn btn-secondary ms-2">Cancel</a>
</form>

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/js/select2.min.js"></script>

<script>
$(document).ready(function () {
    $(".select2-afip").select2({
        ajax: {
            url: "/api/afip/search/",
            dataType: "json",
            delay: 250,
            data: function (params) {
                return { q: params.term };
            },
            processResults: function (data) {
                return { results: data };
            },
        },
        placeholder: "Search AFIP activity...",
        minimumInputLength: 2,
        width: "100%",
    });
});
</script>

{% endblock %}
