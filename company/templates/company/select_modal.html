<!-- Modal: Company selector -->
<div class="modal fade" id="companySelectModal" tabindex="-1" aria-labelledby="companySelectLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="companySelectLabel">Select Company</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p>Select the company you want to work with:</p>
        <ul class="list-group">
          {% for cu in companies %}
            {% if cu.is_active %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
              {{ cu.company.name }}
              <a href="{% url 'company:company_set_active' cu.company.id %}" class="btn btn-primary"></a>
            </li>
            {% endif %}
          {% endfor %}
        </ul>
      </div>
    </div>
  </div>
</div>
